<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Book Search Results</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .book { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
        img { max-width: 150px; display: block; }
    </style>
</head>
<body>

<a href="index.html">&larr; Back to Home</a>
<h1>Book Search Results</h1>
<div id="results"></div>

<script>
$(document).ready(function() {
    $.getJSON("google-books-search.json", function(data) {

        console.log(data);  // Keep temporarily to confirm structure

        if (data.items && Array.isArray(data.items)) {

            data.items.forEach(function(item) {

                let info = item.volumeInfo;

                let html = `
                    <div class="book">
                        <h2>${info.title || "No Title"}</h2>
                        <p><strong>Authors:</strong> ${info.authors || "N/A"}</p>
                        <p><strong>Published:</strong> ${info.publishedDate || "N/A"}</p>
                        <img src="${info.imageLinks ? info.imageLinks.thumbnail : ''}" alt="Cover">
                        <p><a href="${info.infoLink}" target="_blank">More Info</a></p>
                    </div>
                `;

                $("#results").append(html);
            });

        } else {
            console.error("items array not found in JSON.");
        }

    });
});
</script>

</body>
</html>
