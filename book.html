<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Single Book Details</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .book { max-width: 700px; }
        img { max-width: 200px; display: block; margin-top: 20px; }
    </style>
</head>
<body>

<a href="index.html">&larr; Back to Home</a>
<h1>Single Book Details</h1>
<div id="book"></div>

<script>
$(document).ready(function() {
    $.getJSON("google-books-book.json", function(data) {

        let book = data.items[0].volumeInfo;

        let html = `
            <h2>${book.title}</h2>
            <p><strong>Authors:</strong> ${book.authors}</p>
            <p><strong>Publisher:</strong> ${book.publisher}</p>
            <p><strong>Published Date:</strong> ${book.publishedDate}</p>
            <p>${book.description}</p>
            <img src="${book.imageLinks ? book.imageLinks.thumbnail : ''}" alt="Cover">
            <p><a href="${book.infoLink}" target="_blank">More Info</a></p>
        `;

        $("#book").html(html);
    });
});
</script>

</body>
</html>
