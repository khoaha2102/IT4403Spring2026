<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Single Book Details</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        .book {
            max-width: 800px;
            border: 1px solid #ccc;
            padding: 20px;
        }

        img {
            max-width: 200px;
            margin-top: 15px;
        }

        a {
            color: #0056b3;
        }
    </style>
</head>

<body>

<a href="index.html">&larr; Back to Home</a>

<h1>Single Book Details</h1>

<div id="book"></div>

<script>
$(document).ready(function() {

    $.getJSON("google-books-book.json", function(data) {

        var book = data.volumeInfo;

        var html = `
            <div class="book">
                <h2>${book.title || "N/A"}</h2>

                <p><strong>Authors:</strong> ${book.authors ? book.authors.join(", ") : "N/A"}</p>
                <p><strong>Publisher:</strong> ${book.publisher || "N/A"}</p>
                <p><strong>Published Date:</strong> ${book.publishedDate || "N/A"}</p>
                <p><strong>Page Count:</strong> ${book.pageCount || "N/A"}</p>
                <p><strong>Categories:</strong> ${book.categories ? book.categories.join(", ") : "N/A"}</p>
                <p><strong>Language:</strong> ${book.language || "N/A"}</p>

                <p><strong>Description:</strong><br>
                ${book.description || "No description available."}</p>

                ${book.imageLinks ? `<img src="${book.imageLinks.thumbnail}" alt="Book Cover">` : ""}

                ${book.previewLink ? `<p><a href="${book.previewLink}" target="_blank">Preview Book</a></p>` : ""}
                ${book.infoLink ? `<p><a href="${book.infoLink}" target="_blank">More Information</a></p>` : ""}
            </div>
        `;

        $("#book").html(html);
    });

});
</script>

</body>
</html>
